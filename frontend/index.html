<!DOCTYPE html>
<html lang="vi"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý Ngôi Nhà Nhỏ</title>
    <link href="/dist/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Quicksand:wght@400;500;700&amp;display=swap" rel="stylesheet">

    <style>
        /* CSS tùy chỉnh */
        html, body {
            overflow: hidden; /* Ngăn cuộn toàn bộ trang */
            font-family: 'Quicksand', sans-serif; 
            background-color: #F5F5DC;
        }
        .font-title { 
            font-family: 'Playfair Display', serif; 
        }
        #chat-messages::-webkit-scrollbar { 
            width: 8px; 
        }
        #chat-messages::-webkit-scrollbar-track { 
            background: #EFEBE9; 
        }
        #chat-messages::-webkit-scrollbar-thumb { 
            background: #A1887F; 
            border-radius: 4px; 
        }
        #chat-messages::-webkit-scrollbar-thumb:hover { 
            background: #8D6E63; 
        }
        .message-bubble p {
            font-size: 18px;
            line-height: 1.6;
            word-break: break-word; /* Để link dài không làm vỡ layout */
        }
        /* START: CSS ĐỂ GIẢI QUYẾT DỨT ĐIỂM VẤN ĐỀ POPUP */
        /* Quy tắc này có độ ưu tiên rất cao, đảm bảo mọi link bên trong
           bong bóng chat sẽ luôn có màu xanh và gạch chân. */
        .message-bubble a {
            color: #2563eb !important;
            text-decoration: underline !important;
            font-weight: 600 !important;
        }
        /* END: CSS ĐỂ GIẢI QUYẾT DỨT ĐIỂM VẤN ĐỀ POPUP */
    </style>

    <!-- === PWA (Progressive Web App) Support === -->
    <meta name="theme-color" content="#92400e">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
    <link rel="icon" href="images/icons/icon-32x32.png" type="image/png">
    <!-- === End PWA Support === --><style>
        #install-prompt {
            /* Layout */
            display: none; /* JS sẽ đổi thành 'flex' để hiển thị */
            align-items: center;
            gap: 1rem;
            
            /* Position */
            position: fixed;
            bottom: 80px;
            left: 1rem;
            right: 1rem;
            z-index: 2000;
            max-width: 28rem; /* 448px */
            margin-left: auto;
            margin-right: auto;

            /* Appearance */
            background-color: #166534; /* Tương ứng bg-green-800 */
            color: #ffffff;
            padding: 0.75rem; /* 12px */
            border-radius: 0.5rem; /* 8px */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        @media (min-width: 640px) {
            #install-prompt {
                left: 50%;
                transform: translateX(-50%);
                width: auto;
            }
        }
        #install-prompt .prompt-text {
            flex-grow: 1;
            font-size: 0.875rem; /* 14px */
        }
        #install-prompt #install-button {
            background-color: #ffffff;
            color: #166534; /* Màu chữ xanh đậm */
            font-weight: 700;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem; /* 6px */
            border: none;
            cursor: pointer;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }
        #install-prompt #install-button:hover {
            background-color: #f0fdf4; /* Màu nền xanh lá rất nhạt khi hover */
        }
        #install-prompt #close-install-prompt {
            background: none;
            border: none;
            color: #ffffff;
            opacity: 0.7;
            cursor: pointer;
            flex-shrink: 0;
            padding: 0.25rem;
            transition: opacity 0.2s;
        }
        #install-prompt #close-install-prompt:hover {
            opacity: 1;
        }</style></head>
<body class="bg-stone-100 text-stone-800">
    <!-- PWA Install Prompt -->
    <div id="install-prompt">
        <div class="prompt-text">
            Cài đặt ứng dụng để sử dụng thuận tiện hơn!
        </div>
        <button id="install-button">Cài đặt</button>
        <button id="close-install-prompt">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <!-- Container chính -->
    <div class="w-screen flex flex-col bg-white" style="height: var(--app-height, 100vh);">
        
        <!-- Header -->
        <div class="text-center py-4 border-b border-stone-200 shadow-sm flex-shrink-0">
            <h1 class="font-title text-2xl md:text-3xl font-bold text-amber-800">TRỢ LÝ NGÔI NHÀ NHỎ</h1>
            <p class="text-stone-500 text-sm mt-1">Pháp Môn Tâm Linh</p>
        </div>

        <!-- Khu vực tin nhắn -->
        <div id="chat-messages" class="flex-1 p-4 md:p-6 overflow-y-auto bg-stone-50">
            <!-- Tin nhắn sẽ được thêm bằng JavaScript -->
        </div>

        <!-- Form nhập liệu -->
        <div class="p-4 bg-white border-t border-stone-200 shadow-inner flex-shrink-0">
            <div class="flex items-center bg-stone-100 rounded-full p-2">
                <input type="text" id="user-input" placeholder="Đang chuẩn bị..." class="flex-1 bg-transparent px-4 py-2 text-stone-700 text-lg focus:outline-none" autocomplete="off" disabled="">
                <button id="send-button" class="bg-amber-700 hover:bg-amber-800 text-white w-12 h-12 rounded-full transition duration-300 flex items-center justify-center disabled:opacity-50 disabled:bg-stone-400 flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2L15 22l-4-9-9-4 22-2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- SỬA LỖI CHIỀU CAO TRÊN MOBILE ---
        const setAppHeight = () => {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        }
        window.addEventListener('resize', setAppHeight);
        setAppHeight();
        // --- KẾT THÚC SỬA LỖI ---

        // === THÔNG TIN CẤU HÌNH QUAN TRỌNG ===
        const BACKEND_API_URL = "https://trolyngoinhanho.onrender.com";
        const DEFAULT_DOCUMENT_URL = "https://gist.githubusercontent.com/kieunhi050595-star/ddecde18f83b77d06a117a9fcf349188/raw/dulieu.txt";
        let documentContext = "";
        // ===================================

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        // --- Bắt sự kiện click để mở link trong tab mới ---
        chatMessages.addEventListener('click', function(event) {
            const linkElement = event.target.closest('a');
            if (linkElement) {
                event.preventDefault();
                const url = linkElement.href;
                if (url) {
                    window.open(url, '_blank', 'noopener,noreferrer');
                }
            }
        });

        window.addEventListener('load', async () => {
            addMessage('Đang chuẩn bị...', 'bot', 'info');
            try {
                const response = await fetch(DEFAULT_DOCUMENT_URL);
                if (!response.ok) {
                    throw new Error(`Không thể tải tệp (status: ${response.status})`);
                }
                documentContext = await response.text();
                addMessage('Đệ chào Sư huynh ! Sư huynh cứ đặt câu hỏi ạ?', 'bot');
                userInput.disabled = false;
                userInput.placeholder = "Nhập câu hỏi của bạn...";
            } catch (error) {
                console.error("Lỗi khi tải tài liệu mặc định:", error);
                addMessage(`Lỗi khi tải tài liệu: ${error.message}`, 'bot', 'error');
                userInput.placeholder = "Tải tài liệu thất bại!";
            }
        });

        /**
         * Hàm xử lý link và văn bản.
         * @param {string} text - Văn bản đầu vào.
         * @returns {string} - Chuỗi HTML đã được xử lý.
         */
        function linkifyAndSanitize(text) {
            if (typeof text !== 'string') {
                return '';
            }
            
            // Regex để tìm URL trong văn bản
            const urlRegex = /(https?:\/\/[^\s<>"']+)/g;
            
            // An toàn hóa văn bản trước khi chèn link để tránh lỗi XSS
            const sanitizerDiv = document.createElement('div');
            sanitizerDiv.textContent = text;
            const sanitizedText = sanitizerDiv.innerHTML;
            
            // Thay thế URL trong chuỗi đã an toàn hóa bằng thẻ <a>
            // "$&" là một ký tự đặc biệt trong hàm replace, đại diện cho chính chuỗi URL đã được tìm thấy.
            const linkifiedText = sanitizedText.replace(urlRegex, '<a href="$&" target="_blank" rel="noopener noreferrer">$&</a>');
            
            // Cuối cùng, thay thế ký tự xuống dòng bằng thẻ <br> để hiển thị đúng trên HTML
            return linkifiedText.replace(/\n/g, '<br>');
        }

        function addMessage(message, sender, type = 'normal') {
            const messageWrapper = document.createElement('div');
            messageWrapper.classList.add('message', 'mb-4', 'flex', 'w-full');
            
            const messageBubble = document.createElement('div');
            messageBubble.classList.add('message-bubble', 'rounded-xl', 'p-4', 'max-w-xl', 'shadow-md');

            if (sender === 'user') {
                messageWrapper.classList.add('justify-end');
                messageBubble.classList.add('bg-amber-600', 'text-white');
            } else {
                messageWrapper.classList.add('justify-start');
                if (type === 'error') {
                    messageBubble.classList.add('bg-red-800', 'text-white');
                } else if (type === 'info') {
                    messageBubble.classList.add('bg-stone-200', 'text-stone-500', 'text-center', 'w-full', 'max-w-full', 'shadow-none');
                } else {
                    messageBubble.classList.add('bg-stone-200', 'text-stone-800');
                }
            }

            const contentP = document.createElement('p');
            contentP.innerHTML = linkifyAndSanitize(message);
            
            messageBubble.appendChild(contentP);
            messageWrapper.appendChild(messageBubble);
            chatMessages.appendChild(messageWrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function callBackendAPI(question, context) {
            const url = `${BACKEND_API_URL.replace(/\/$/, "")}/api/chat`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: question,
                    context: context
                })
            });

            if (!response.ok) {
                let errorText = `Lỗi HTTP: ${response.status} ${response.statusText}`;
                try {
                    const errorData = await response.json();
                    errorText = `Lỗi từ server: ${errorData.error || response.statusText}`;
                } catch (e) {
                    errorText = `Server trả về lỗi không phải JSON (status: ${response.status}). Vui lòng kiểm tra lại địa chỉ BACKEND_API_URL.`;
                }
                throw new Error(errorText);
            }

            const result = await response.json();
            return result.answer;
        }

        async function handleSendMessage() {
            const userQuestion = userInput.value.trim();
            if (!userQuestion) return;
            
            addMessage(userQuestion, 'user');
            userInput.value = '';
            sendButton.disabled = true;
            sendButton.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>';

            try {
                const answer = await callBackendAPI(userQuestion, documentContext);
                console.log("Dữ liệu gốc từ API:", answer);
                addMessage(answer, 'bot');
            } catch (error) {
                console.error("Lỗi chi tiết:", error);
                addMessage(error.message, 'bot', 'error');
            } finally {
                sendButton.disabled = false;
                sendButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2L15 22l-4-9-9-4 22-2z"></path></svg>';
            }
        }

        sendButton.addEventListener('click', handleSendMessage);
        userInput.addEventListener('keydown', (event) => { 
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                handleSendMessage();
            }
        });
        userInput.addEventListener('input', () => { 
            sendButton.disabled = userInput.value.trim().length === 0 || !documentContext; 
        });
    </script>
	<script>
			// === PWA Installation Logic ===
			window.addEventListener('load', () => {
				const installPromptEl = document.getElementById('install-prompt');
				const installButton = document.getElementById('install-button');
				const closeInstallPromptButton = document.getElementById('close-install-prompt');
				let deferredPrompt;

				if ('serviceWorker' in navigator) {
					navigator.serviceWorker.register('sw.js')
					.then((reg) => console.log('Service worker registered.', reg))
					.catch((err) => console.error('Service worker registration failed:', err));
				}

				window.addEventListener('beforeinstallprompt', (e) => {
					e.preventDefault();
					deferredPrompt = e;
					if (installPromptEl) {
						installPromptEl.style.display = 'flex';
					}
				});

				if (installButton) {
					installButton.addEventListener('click', async () => {
						if (deferredPrompt) {
							if (installPromptEl) installPromptEl.style.display = 'none';
							deferredPrompt.prompt();
							await deferredPrompt.userChoice;
							deferredPrompt = null;
						}
					});
				}

				if (closeInstallPromptButton) {
					closeInstallPromptButton.addEventListener('click', () => {
						 if (installPromptEl) {
							installPromptEl.style.display = 'none';
						 }
					});
				}
				
				setTimeout(() => {
					const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
					if (!isStandalone && deferredPrompt) {
						if (installPromptEl) installPromptEl.style.display = 'flex';
					}
				}, 3000);
			});
	</script>
</body>
</html>
